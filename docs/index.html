h1{font-size:2rem;margin-top:24px;margin-bottom:4px;background:linear-gradient(135deg,#0a0 0%,#f00 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:-1px -1px 1px #7a42ed}
.sub{font-size:.9rem;color:#a0a0b0}
.pc{width:100%;max-width:800px;padding:24px;position:relative;display:flex;flex-direction:column;align-items:stretch;min-height:100vh}
.np{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:8px 0;min-height:60px;width:100%;transition:opacity .4s ease;align-self:center}.np .btn:last-child{color:#ffd700}.np.title-glow .tt{color:#fec;text-shadow:0 0 12px rgba(254,236,204,.4)}
.np .btn.dim{opacity:.65}
.tt{font-family:'Creepster',cursive;font-size:1.9rem;font-weight:300;color:#f0f0ff;word-break:break-word;letter-spacing:2px;text-shadow:0 0 12px rgba(139,92,246,.3);text-align:center;flex:1;animation:titlePulse .667s ease-in-out infinite alternate,titleFloat .7s ease-in-out infinite alternate}
.ttz{transform:scaleY(1.41) scaleX(1.17);transform-origin:center;display:inline;flex:1;text-align:center;z-index:-1;padding:0 12px}
.pw{position:relative;width:100%;border-radius:8px;overflow:visible;background:#0a0a14;z-index:2;padding-bottom:30px;align-self:center}.pc.playlist-hidden .pw{margin-top:auto}.pw.shake,.pl.shake{animation:shake 375ms ease-in-out}
.pf{display:block;width:100%;height:78.3px;border:none;background:#0a0a14;zoom:1.667;-moz-transform:scale(1.667);-moz-transform-origin:0 0;overflow:hidden}
#audioPlayer{display:block;width:100%;height:54px;border:none;background:#0a0a14}
#audioPlayer::-webkit-media-controls-panel{background:#0a0a14;height:54px}
#audioPlayer::-webkit-media-controls-enclosure{background:#0a0a14;border-radius:8px}
#audioPlayer::-webkit-media-controls-play-button{transform:scale(1.5);margin:0 10px}
#audioPlayer::-webkit-media-controls-mute-button{transform:scale(1.3);margin:0 6px}
#audioPlayer::-webkit-media-controls-timeline{height:14px;margin:0 8px}
#audioPlayer::-webkit-media-controls-volume-slider{height:14px;margin:0 6px}
#audioPlayer::-webkit-media-controls-current-time-display,
#audioPlayer::-webkit-media-controls-time-remaining-display{color:#c8c8d0;font-family:monospace;font-size:13px}
.audio-row{display:flex;align-items:center;gap:6px;width:100%;overflow:hidden}
.audio-row #audioPlayer{flex:1;min-width:0;width:auto}
.suno-link-btn{flex-shrink:0;width:36px;height:36px;display:none;transform:translateX(-5px);align-items:center;justify-content:center;background:rgba(10,10,20,.85);border:1px solid #33334d;border-radius:6px;color:#e8e8f0;text-decoration:none;cursor:pointer;z-index:100;transition:all .2s}
.suno-link-btn:hover{background:rgba(30,30,50,.9);border-color:#555570;color:#fff;transform:scale(1.1)}
.suno-link-btn svg{width:18px;height:18px;fill:currentColor}
#audioPlayer::-webkit-media-controls-play-button,
#audioPlayer::-webkit-media-controls-mute-button,
#audioPlayer::-webkit-media-controls-timeline,
#audioPlayer::-webkit-media-controls-volume-slider{filter:invert(1)}
#audioPlayer::-webkit-media-controls-current-time-display,
#audioPlayer::-webkit-media-controls-time-remaining-display{color:#fff}
.pl{max-height:400px;overflow-y:auto;border-radius:8px;margin-top:-30px;position:relative;z-index:3;background:#0a0a14;width:100%;transform:translateZ(0);opacity:.96;transition:opacity .4s ease,max-height .4s ease,margin-top .4s ease,transform .4s ease}
.pl.hidden{opacity:0;max-height:0;margin-top:0;overflow:hidden;pointer-events:none;transform:translateY(-20px)}
.pli{padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .15s;border-bottom:1px solid #1e1e2e}
.pli:hover{background:#1a1a2e}
.pli.on{background:#2d1f4a}
.tn{color:#666680;font-size:.9rem;min-width:32px;text-align:center;font-variant-numeric:tabular-nums;transition:all .15s}
.tn.instr{border:1.5px solid #cef;border-radius:50%;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;min-width:28px;color:#cef;margin:-2px 0}
.pli:hover .tn.instr{border-color:#dff;color:#dff}
.pli.on .tn.instr{border-color:#eef;color:#eef}
.ti{flex:1;min-width:0}
.tnm{font-size:1rem;color:#d0d0e0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pli:hover .tnm{color:#fff}
.pli.on .tnm{color:#c4b5fd;font-weight:500}
.tm{font-size:.75rem;color:#555570;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px;text-align:right;flex-shrink:0}
.pli:hover .tm{color:#777790}
.pli.on .tm{color:#6b5b8a}
.dur{font-size:.75rem;color:#8888a0;font-variant-numeric:tabular-nums;min-width:36px;text-align:right;margin-left:6px;flex-shrink:0}
.pli:hover .dur{color:#aaaac0}
.pli.on .dur{color:#8b7bb0}
.fch{display:inline-block;-webkit-text-stroke:0 rgba(240,240,255,.85)}
.fb{display:flex;justify-content:space-between;align-items:center;width:100%;margin-top:16px;align-self:center}.fb.playlist-hidden{margin-bottom:47px}.fb.playlist-hidden h1{background:none!important;-webkit-background-clip:initial!important;-webkit-text-fill-color:#000!important;background-clip:initial!important;color:#000!important;text-shadow:0 0 6px #fff,0 0 12px rgba(255,255,255,.5)}
.btn{font-family:Impact,Haettenschweiler,'Arial Narrow Bold',sans-serif;font-variant:small-caps;font-size:1.15rem;font-weight:bold;letter-spacing:1px;background:#1e0a52;color:#e8e8f0;border:none;padding:14px 28px;border-radius:8px;cursor:pointer;transition:all .2s;opacity:.96}
.btn:hover{background:#2a0d6e;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}.np .btn:first-child{clip-path:polygon(0 50%,14px 0,100% 0,100% 100%,14px 100%);padding-left:34px;border-radius:0 8px 8px 0}.np .btn:last-child{clip-path:polygon(0 0,calc(100% - 14px) 0,100% 50%,calc(100% - 14px) 100%,0 100%);padding-right:34px;border-radius:8px 0 0 8px}
.btn.ghost{background:transparent;color:#fec;border:2px solid #fec}
.btn.ghost:hover{background:#3a2a1a;border-color:#fec;color:#fec}
.btn.on{background:#fec;color:#050508;border:2px solid #fec}
@keyframes shake{0%{transform:translateX(9px)}12.5%{transform:translateX(-7.9px)}25%{transform:translateX(6.8px)}37.5%{transform:translateX(-5.6px)}50%{transform:translateX(4.5px)}62.5%{transform:translateX(-3.4px)}75%{transform:translateX(2.3px)}87.5%{transform:translateX(-1.1px)}100%{transform:translateX(0)}}10%{transform:translateX(-7.8px)}20%{transform:translateX(5.4px)}30%{transform:translateX(-3px)}40%{transform:translateX(1.2px)}50%{transform:translateX(0)}60%{transform:translateX(-0.6px)}70%{transform:translateX(0.3px)}80%{transform:translateX(-0.1px)}90%{transform:translateX(0)}100%{transform:translateX(0)}}@keyframes titlePulse{0%{filter:brightness(1)}33%{filter:brightness(.9)}66%{filter:brightness(1)}100%{filter:brightness(.835)}}
@keyframes titleFloat{0%{transform:translateY(-.33px)}33%{transform:translateY(.33px)}66%{transform:translateY(-.42px)}100%{transform:translateY(.25px)}}
.pl::-webkit-scrollbar{width:8px}
.pl::-webkit-scrollbar-track{background:#0c0c16;border-radius:4px}
.pl::-webkit-scrollbar-thumb{background:#33334d;border-radius:4px}

const STAR_KEY='atribute_stars';

let q=[],i=0,sh=false;
const gdPlayer=document.getElementById('gdPlayer'),audioPlayer=document.getElementById('audioPlayer'),audioWrap=document.getElementById('audioWrap'),l=document.getElementById('l'),s=document.getElementById('s'),shb=document.getElementById('sh'),t=document.getElementById('t'),sunoLinkBtn=document.getElementById('sunoLinkBtn'),bgEl=document.getElementById('bgEl'),npEl=document.getElementById('npEl');
audioPlayer.volume=0.65;

function getQueueSource(){let source=[...data];if(showingStarsOnly)source=source.filter(tr=>isStarred(tr.suno_id||tr.gd_id));if(showingInstrumentalsOnly)source=source.filter(tr=>tr.has_vocal===false);return source}
function buildQueue(){const source=getQueueSource();q=sh?shf(source):[...source]}
function gdUrl(id){return'https://drive.google.com/file/d/'+id+'/preview'}
function shf(a){const b=[...a];for(let j=b.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[b[j],b[k]]=[b[k],b[j]]}return b}
function sub(m){s.textContent=m}

function load(x){
  const tr=q[x];if(!tr)return;i=x;sub('Loading...');
  if(isSuno(tr)){
    gdPlayer.style.display='none';gdPlayer.src='';
    audioWrap.style.display='block';
    audioPlayer.src=getAudioUrl(tr);audioPlayer.load();
    if(tr.artwork){bgEl.style.backgroundImage='url('+tr.artwork+')'}else{bgEl.style.backgroundImage=''}
    const sp=sunoPage(tr);
    if(sp){sunoLinkBtn.href=sp;sunoLinkBtn.style.display='flex'}else{sunoLinkBtn.style.display='none'}
  }else{
    audioPlayer.pause();audioPlayer.src='';
    audioWrap.style.display='none';
    gdPlayer.style.display='block';gdPlayer.src=gdUrl(tr.gd_id);
    bgEl.style.backgroundImage='';sunoLinkBtn.style.display='none'
  }
  setT(tr.name);draw();
  setTimeout(()=>{const it=l.querySelector('.on');if(it)it.scrollIntoView({behavior:'smooth',block:'nearest'})},50)
}
function play(x){load(x)}
function next(){if(!q.length)return;i=(i+1)%q.length;load(i)}
function prev(){if(!q.length)return;i=(i-1+q.length)%q.length;load(i)}

function shuf(){
  const wasShuffled=sh;
  sh=!sh;shb.classList.toggle('on',sh);
  if(!wasShuffled&&sh){const pw=document.getElementById('pw')||document.querySelector('.pw'),pl=document.getElementById('l');if(pw){pw.classList.add('shake');setTimeout(()=>pw.classList.remove('shake'),385)}if(pl){pl.classList.add('shake');setTimeout(()=>pl.classList.remove('shake'),385)}}
  const cid=q[i]?.suno_id||q[i]?.gd_id;
  buildQueue();
  if(cid){const idx=q.findIndex(tr=>(tr.suno_id||tr.gd_id)===cid);if(idx!==-1){i=idx;draw();return}}
  i=0;if(q.length)load(0);else{gdPlayer.src='';audioPlayer.pause();audioPlayer.src='';let msg='Select a track';if(showingStarsOnly&&showingInstrumentalsOnly)msg='No starred instrumental tracks';else if(showingStarsOnly)msg='No starred tracks';else if(showingInstrumentalsOnly)msg='No instrumental tracks';t.textContent=msg;s.textContent='';bgEl.style.backgroundImage='';audioWrap.style.display='none';sunoLinkBtn.style.display='none';draw()}
}

function draw(){
  if(!q.length){let msg='No tracks configured.';if(showingStarsOnly&&showingInstrumentalsOnly)msg='No starred instrumental tracks.';else if(showingStarsOnly)msg='No starred tracks.';else if(showingInstrumentalsOnly)msg='No instrumental tracks.';l.innerHTML='<div class="empty">'+msg+'</div>';return}
  l.innerHTML=q.map((tr,x)=>{
    const on=x===i,starred=isStarred(tr.suno_id||tr.gd_id),showGold=starred&&!showingStarsOnly,id=tr.suno_id||tr.gd_id,dur=tr.duration_str?'<span class="dur">'+htm(tr.duration_str)+'</span>':'',isInstr=tr.has_vocal===false,numClass=isInstr?'tn instr':'tn';
    return'<div class="pli '+(on?'on ':'')+(showGold?'starred-track ':'')+'" data-i="'+x+'"><span class="'+numClass+'" onclick="play('+x+')">'+(x+1)+'</span><div class="ti" onclick="play('+x+')"><div class="track-left"><button class="star-btn '+(starred?'starred':'')+'" data-id="'+id+'" onclick="toggleStar(this,event)">'+(starred?'★':'☆')+'</button><div style="flex:1;min-width:0;"><div class="tnm">'+htm(tr.name)+'</div></div></div></div><div class="tm">'+htm(tr.m)+'</div>'+dur+'</div>'
  }).join('')
}

gdPlayer.addEventListener('load',()=>sub('Streaming from Google Drive'));
audioPlayer.addEventListener('loadedmetadata',()=>{if(q[i]&&isSuno(q[i]))sub('Streaming from Suno')});
audioPlayer.addEventListener('canplay',()=>{if(q[i]&&isSuno(q[i])){audioPlayer.play().then(()=>sub('Streaming from Suno')).catch(()=>sub('Click play to start (Suno)'))}});
audioPlayer.addEventListener('ended',next);
audioPlayer.addEventListener('error',e=>{console.error('Audio error:',e);if(q[i]&&isSuno(q[i])){const src=audioPlayer.src;audioPlayer.src='';setTimeout(()=>{audioPlayer.src=src;audioPlayer.load()},500);sub('Retrying Suno stream...')}});

buildQueue();draw();if(q.length)load(0);setViewStar('☆');setInstrBtn('○');setPlBtn('■');
